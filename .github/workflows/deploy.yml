name: Auto Deploy to Production

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    name: Deploy on Mac mini
    runs-on: self-hosted

    env:
      PATH: /opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy secret keys (not in git)
        run: cp -r /Users/tungtranle/Projects/Beer-HL/bhl-oms/keys bhl-oms/keys

      - name: Debug Docker access
        run: |
          echo "PATH = $PATH"
          which docker || echo "docker not found"
          docker info 2>&1 | head -5 || echo "docker info failed"
          docker compose version || echo "docker compose failed"

      - name: Build Docker images
        run: |
          set -o pipefail
          LOGFILE="/tmp/bhl-build-$(date +%s).log"
          docker compose -f bhl-oms/docker-compose.prod.yml build web api vrp 2>&1 | tee "$LOGFILE"
          echo "BUILD_LOG=$LOGFILE" >> "$GITHUB_ENV"
          echo "Build xong"

      - name: Restart services
        run: docker compose -f bhl-oms/docker-compose.prod.yml up -d

      - name: Sync DB (migrations + master data)
        run: |
          sleep 8
          bash bhl-oms/scripts/db-sync.sh

      - name: Cleanup old images
        run: docker image prune -f

      - name: Health Check
        run: |
          sleep 15
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "API healthy - Deploy thanh cong!"
              docker compose -f bhl-oms/docker-compose.prod.yml ps
              exit 0
            fi
            echo "Thu $i/5 - doi them 5s..."
            sleep 5
          done
          echo "API khong phan hoi sau 40s"
          docker compose -f bhl-oms/docker-compose.prod.yml logs api --tail 30
          exit 1
