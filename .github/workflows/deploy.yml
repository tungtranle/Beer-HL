name: Auto Deploy to Production

on:
  push:
    branches: [ "master" ]
    paths:
      - ".github/workflows/deploy.yml"
      - "setup-runner.sh"
      - "enable-auto-deploy.sh"
      - "bhl-oms/**"
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy on Mac mini
    runs-on: [self-hosted, macOS, production]
    timeout-minutes: 30

    env:
      PATH: /opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      PROJECT_DIR: bhl-oms

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trust checked out workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Copy secret keys (not in git)
        run: cp -r /Users/tungtranle/Projects/Beer-HL/$PROJECT_DIR/keys $PROJECT_DIR/keys

      - name: Debug Docker access
        run: |
          echo "PATH = $PATH"
          which docker || echo "docker not found"
          docker info 2>&1 | head -5 || echo "docker info failed"
          docker compose version || echo "docker compose failed"

      - name: Bypass Docker keychain (stub helper)
        run: |
          STUB_DIR="/tmp/bhl-stub-bin.$$"
          mkdir -p "$STUB_DIR"
          cat > "$STUB_DIR/docker-credential-desktop" <<'STUB'
          #!/bin/bash
          case "$1" in
            get) echo '{"ServerURL":"","Username":"","Secret":""}' ;;
            list) echo '{}' ;;
            *) echo '{}' ;;
          esac
          exit 0
          STUB
          chmod +x "$STUB_DIR/docker-credential-desktop"
          echo "STUB_DIR=$STUB_DIR" >> $GITHUB_ENV

      - name: Build Docker images
        env:
          BUILD_COMMIT_SHA: ${{ github.sha }}
          BUILD_BRANCH: ${{ github.ref_name }}
        run: |
          export PATH="$STUB_DIR:$PATH"
          export BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          docker compose -f $PROJECT_DIR/docker-compose.prod.yml build web api vrp
          echo "Build xong"
          rm -rf "$STUB_DIR" || true

      - name: Ensure SSL certs exist
        run: |
          WORKSPACE_SSL="$GITHUB_WORKSPACE/$PROJECT_DIR/nginx/ssl"
          mkdir -p "$WORKSPACE_SSL"

          # Helper: check if a cert is real (not self-signed, not expired)
          is_real_cert() {
            local f="$1"
            [ -f "$f" ] || return 1
            # Check issuer is not self-signed (CN != O for real certs)
            local issuer subject
            issuer=$(openssl x509 -in "$f" -noout -issuer 2>/dev/null)
            subject=$(openssl x509 -in "$f" -noout -subject 2>/dev/null)
            # Let's Encrypt certs have issuer "Let's Encrypt"
            echo "$issuer" | grep -qi "let.s encrypt\|letsencrypt\|zerossl\|digicert\|sectigo" && return 0
            # If issuer != subject it's at least a proper CA cert (not self-signed)
            [ "$issuer" != "$subject" ] && return 0
            return 1
          }

          # Search priority: letsencrypt system dirs > docker volumes > persistent project dir
          FOUND=""
          for SEARCH_DIR in \
            "/etc/letsencrypt/live/bhl.symper.us" \
            "/etc/letsencrypt/live/oms.bhl.vn" \
            "/var/lib/docker/volumes/bhl-oms_ssl/_data" \
            "/Users/tungtranle/ssl" \
            "/Users/tungtranle/certs" \
            "/Users/tungtranle/Projects/Beer-HL/bhl-oms/nginx/ssl" \
            "/Users/tungtranle/Projects/Beer-HL/nginx/ssl"; do
            if [ -f "$SEARCH_DIR/fullchain.pem" ] && [ -f "$SEARCH_DIR/privkey.pem" ]; then
              echo "Found certs at: $SEARCH_DIR"
              openssl x509 -in "$SEARCH_DIR/fullchain.pem" -noout -subject -issuer -enddate 2>/dev/null || true
              if is_real_cert "$SEARCH_DIR/fullchain.pem"; then
                echo "  -> REAL cert (Let's Encrypt or CA-signed), using this"
                FOUND="$SEARCH_DIR"
                break
              else
                echo "  -> Self-signed, skipping"
              fi
            fi
          done

          if [ -n "$FOUND" ]; then
            cp "$FOUND/fullchain.pem" "$WORKSPACE_SSL/fullchain.pem"
            cp "$FOUND/privkey.pem" "$WORKSPACE_SSL/privkey.pem"
            echo "SSL certs copied from: $FOUND"
          else
            echo "=== WARNING: No real SSL cert found anywhere! Listing all search paths: ==="
            for SEARCH_DIR in \
              "/etc/letsencrypt/live" \
              "/Users/tungtranle/ssl" \
              "/Users/tungtranle/certs" \
              "/Users/tungtranle/Projects/Beer-HL/bhl-oms/nginx/ssl"; do
              echo "--- $SEARCH_DIR ---"
              ls -la "$SEARCH_DIR" 2>/dev/null || echo "  (not found)"
            done
            if [ ! -f "$WORKSPACE_SSL/fullchain.pem" ]; then
              echo "Generating self-signed cert (FALLBACK - Cloudflare Full mode will fail)"
              openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
                -keyout "$WORKSPACE_SSL/privkey.pem" \
                -out "$WORKSPACE_SSL/fullchain.pem" \
                -subj '/C=VN/ST=QuangNinh/L=HaLong/O=BHL/CN=bhl.symper.us'
            fi
          fi
          echo "=== Final cert in use ==="
          openssl x509 -in "$WORKSPACE_SSL/fullchain.pem" -noout -subject -issuer -enddate 2>/dev/null || echo "No cert"

      - name: Restart services
        run: |
          # Bring up all services; force-recreate nginx to pick up config changes
          docker compose -f $PROJECT_DIR/docker-compose.prod.yml up -d
          docker compose -f $PROJECT_DIR/docker-compose.prod.yml up -d --force-recreate --no-deps nginx

      - name: Sync DB (migrations + master data)
        run: |
          sleep 8
          bash $PROJECT_DIR/scripts/db-sync.sh

      - name: Cleanup old images
        run: docker image prune -f

      - name: Health Check
        run: |
          echo "=== Container status after restart ==="
          docker compose -f $PROJECT_DIR/docker-compose.prod.yml ps

          # Wait for API
          sleep 20
          API_OK=0
          for i in 1 2 3 4 5 6 7 8; do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              API_OK=1
              echo "API healthy (localhost:8080) ✓"
              break
            fi
            echo "Wait API $i/8 ... ($(date '+%H:%M:%S'))"
            sleep 10
          done

          # Always show nginx logs for diagnosis
          echo "=== Nginx logs ==="
          docker compose -f $PROJECT_DIR/docker-compose.prod.yml logs nginx --tail 40
          echo "=== Container final status ==="
          docker compose -f $PROJECT_DIR/docker-compose.prod.yml ps

          if [ "$API_OK" != "1" ]; then
            echo "=== FAIL: API khong phan hoi sau 100s ==="
            docker compose -f $PROJECT_DIR/docker-compose.prod.yml logs api --tail 50
            exit 1
          fi

          # Test nginx directly on localhost (bypass Cloudflare)
          echo "=== Test nginx localhost:80 ==="
          HTTP80=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/ --max-time 5 2>/dev/null || echo "0")
          echo "localhost:80 HTTP code: $HTTP80"

          echo "=== Test nginx localhost:443 ==="
          HTTP443=$(curl -sk -o /dev/null -w "%{http_code}" https://localhost/health --max-time 5 2>/dev/null || echo "0")
          echo "localhost:443 /health HTTP code: $HTTP443"

          # Test via Cloudflare (informational only)
          echo "=== Test public HTTPS ==="
          HTTPS_PUBLIC=$(curl -sk -o /dev/null -w "%{http_code}" https://bhl.symper.us/health --max-time 15 2>/dev/null || echo "0")
          echo "bhl.symper.us/health: HTTP $HTTPS_PUBLIC"

          # Success if API + nginx both responding locally
          if [ "$HTTP80" != "0" ] || [ "$HTTP443" != "0" ]; then
            if [ "$HTTP443" = "0" ]; then
              echo "=== FAIL: Nginx HTTPS (port 443) KHONG phan hoi - SSL cert issue? ==="
              echo "--- Nginx logs ---"
              docker compose -f $PROJECT_DIR/docker-compose.prod.yml logs nginx --tail 50
              exit 1
            fi
            echo "=== DEPLOY THANH CONG - API + Nginx UP ==="
            if [ "$HTTPS_PUBLIC" != "200" ]; then
              echo "WARNING: Public HTTPS chua accessible (Cloudflare delay?) - site se on sau vai phut"
            fi
            exit 0
          else
            echo "=== FAIL: Nginx khong respond tren localhost:80 va localhost:443 ==="
            exit 1
          fi
