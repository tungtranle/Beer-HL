name: Auto Deploy to Production

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    name: Deploy on Mac mini
    runs-on: self-hosted

    env:
      PATH: /opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      DEPLOY_KEYS_DIR: /Users/tungtranle/Projects/Beer-HL/bhl-oms/keys

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy secret keys (not in git)
        run: cp -r "$DEPLOY_KEYS_DIR" bhl-oms/keys

      - name: Build Docker images
        run: |
          docker compose -f bhl-oms/docker-compose.prod.yml build web api vrp
          echo "Build xong"

      - name: Restart services
        run: |
          docker compose -f bhl-oms/docker-compose.prod.yml up -d
          echo "Services da restart"

      - name: Cleanup old images
        run: docker image prune -f

      - name: Health Check
        run: |
          sleep 15
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "API healthy - Deploy thanh cong!"
              docker compose -f bhl-oms/docker-compose.prod.yml ps
              exit 0
            fi
            echo "Thu $i/5 - doi them 5s..."
            sleep 5
          done
          echo "API khong phan hoi sau 40s"
          docker compose -f bhl-oms/docker-compose.prod.yml logs api --tail 30
          exit 1
