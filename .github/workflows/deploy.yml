name: Auto Deploy to Production

on:
  push:
    branches: [ "master" ]
    paths:
      - ".github/workflows/deploy.yml"
      - "setup-runner.sh"
      - "enable-auto-deploy.sh"
      - "bhl-oms/**"
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy on Mac mini
    runs-on: [self-hosted, macOS, production]
    timeout-minutes: 30

    env:
      PATH: /opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      PROJECT_DIR: bhl-oms

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trust checked out workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Copy secret keys (not in git)
        run: cp -r /Users/tungtranle/Projects/Beer-HL/$PROJECT_DIR/keys $PROJECT_DIR/keys

      - name: Debug Docker access
        run: |
          echo "PATH = $PATH"
          which docker || echo "docker not found"
          docker info 2>&1 | head -5 || echo "docker info failed"
          docker compose version || echo "docker compose failed"

      - name: Unlock Keychain for Docker
        run: security unlock-keychain -p "" ~/Library/Keychains/login.keychain-db || true

      - name: Build Docker images
        env:
          DOCKER_CONFIG: /tmp/bhl-docker-cfg
          BUILD_COMMIT_SHA: ${{ github.sha }}
          BUILD_BRANCH: ${{ github.ref_name }}
        run: |
          mkdir -p "$DOCKER_CONFIG"
          echo '{}' > "$DOCKER_CONFIG/config.json"
          export BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          docker compose -f $PROJECT_DIR/docker-compose.prod.yml build web api vrp
          echo "Build xong"

      - name: Restart services
        run: docker compose -f $PROJECT_DIR/docker-compose.prod.yml up -d

      - name: Sync DB (migrations + master data)
        run: |
          sleep 8
          bash $PROJECT_DIR/scripts/db-sync.sh

      - name: Cleanup old images
        run: docker image prune -f

      - name: Health Check
        run: |
          sleep 15
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "API healthy - Deploy thanh cong!"
              docker compose -f $PROJECT_DIR/docker-compose.prod.yml ps
              if curl -skf https://bhl.symper.us/login > /dev/null 2>&1; then
                echo "Public login page healthy"
                exit 0
              fi
              echo "API healthy nhưng public login page chua pass"
            fi
            echo "Thu $i/5 - doi them 5s..."
            sleep 5
          done
          echo "API khong phan hoi sau 40s"
          docker compose -f $PROJECT_DIR/docker-compose.prod.yml logs api --tail 30
          exit 1
