# AQF G3 — Product Experience Gate
# Trigger: pre-deploy toi staging/production hoac weekly schedule
# Muc tieu: < 15 phut
# Checks: E2E smoke journeys (Playwright), visual diff, a11y

name: "AQF G3 — Product Experience Gate"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]
  schedule:
    - cron: "0 1 * * 1"  # Moi thu 2 luc 1:00 AM UTC (8:00 AM VN)
  push:
    branches: [main]
    paths:
      - "bhl-oms/web/src/**"

env:
  NODE_VERSION: "20"

jobs:
  # ═══════════════════════════════════════════════════════
  # G3-1: E2E Smoke Journeys (4 critical paths)
  # ═══════════════════════════════════════════════════════
  g3-e2e-smoke:
    name: "G3 ▸ E2E Smoke (4 critical paths)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bhl-oms/web
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: bhl-oms/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npx playwright test --project=chromium
        env:
          BASE_URL: ${{ vars.STAGING_URL || 'http://localhost:3000' }}
          API_URL: ${{ vars.STAGING_API_URL || 'http://localhost:8080' }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-report
          path: bhl-oms/web/playwright-report/
          retention-days: 7

      - name: Upload test traces (on failure)
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-traces
          path: bhl-oms/web/test-results/
          retention-days: 3

  # ═══════════════════════════════════════════════════════
  # G3-2: Mobile E2E (driver app flows)
  # ═══════════════════════════════════════════════════════
  g3-e2e-mobile:
    name: "G3 ▸ E2E Mobile (driver flows)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bhl-oms/web
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: bhl-oms/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run mobile E2E (driver-*.spec.ts)
        run: npx playwright test --project=mobile-android "driver-"
        env:
          BASE_URL: ${{ vars.STAGING_URL || 'http://localhost:3000' }}
          API_URL: ${{ vars.STAGING_API_URL || 'http://localhost:8080' }}
        continue-on-error: false

  # ═══════════════════════════════════════════════════════
  # G3-3: Accessibility scan (axe-core)
  # ═══════════════════════════════════════════════════════
  g3-accessibility:
    name: "G3 ▸ Accessibility (axe-core)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bhl-oms/web
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: bhl-oms/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright + axe
        run: |
          npx playwright install --with-deps chromium
          npm install --save-dev @axe-core/playwright

      - name: Run accessibility tests
        run: npx playwright test --project=chromium --grep "a11y|accessibility"
        continue-on-error: true  # warn, không block hard ở G3 MVP

  # ═══════════════════════════════════════════════════════
  # G3 Summary
  # ═══════════════════════════════════════════════════════
  g3-gate-summary:
    name: "G3 ▸ Gate Summary"
    needs:
      - g3-e2e-smoke
      - g3-e2e-mobile
      - g3-accessibility
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Evaluate G3 gate
        run: |
          SMOKE="${{ needs.g3-e2e-smoke.result }}"
          MOBILE="${{ needs.g3-e2e-mobile.result }}"

          if [ "$SMOKE" = "failure" ] || [ "$MOBILE" = "failure" ]; then
            echo "══════════════════════════════════════"
            echo "⛔ AQF G3 GATE: FAIL — Không deploy"
            echo "══════════════════════════════════════"
            echo "E2E Smoke: $SMOKE"
            echo "E2E Mobile: $MOBILE"
            exit 1
          fi

          echo "══════════════════════════════════════"
          echo "✅ AQF G3 GATE: PASS — Deploy cho phép"
          echo "══════════════════════════════════════"
