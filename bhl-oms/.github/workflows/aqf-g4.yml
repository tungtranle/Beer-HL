# AQF G4 — Post-Deploy Health Monitor
# Chạy sau mỗi deploy VÀ mỗi ngày 07:00 ICT (00:00 UTC)
# G4 = Level 5 trong AQF pyramid: background monitoring sau khi code live
#
# Checks:
#   1. Health endpoint /v1/health responds HTTP 200
#   2. Critical API endpoints respond (không timeout)
#   3. Test Portal AQF status có thể đọc được
#   4. Smoke: login + orders + trips endpoints
# Alert: GitHub Actions summary + tự coi như fail nếu health down

name: "AQF G4 — Daily Health Monitor"

on:
  schedule:
    - cron: "0 0 * * *"   # 00:00 UTC = 07:00 ICT hàng ngày
  workflow_dispatch:
    inputs:
      target_url:
        description: "Backend URL to monitor (default: staging)"
        required: false
        default: ""

env:
  # Staging URL — override via workflow_dispatch input hoặc secret
  BACKEND_URL: ${{ inputs.target_url || vars.STAGING_BACKEND_URL || 'http://localhost:8080' }}
  HEALTH_TIMEOUT: "10"   # seconds per request

jobs:
  # ═══════════════════════════════════════════════════════
  # G4-1: HTTP Health Checks (không cần DB/service)
  # ═══════════════════════════════════════════════════════
  health-check:
    name: "G4 ▸ Health endpoint check"
    runs-on: ubuntu-latest
    steps:
      - name: "Check /v1/health"
        run: |
          echo "=== G4: Checking backend health ==="
          echo "Target: $BACKEND_URL"
          
          STATUS=$(curl -s -o /tmp/health_resp.json -w "%{http_code}" \
            --max-time $HEALTH_TIMEOUT \
            "$BACKEND_URL/v1/health" 2>/dev/null || echo "000")
          
          echo "HTTP Status: $STATUS"
          
          if [ "$STATUS" = "200" ]; then
            echo "✅ G4 PASS: /v1/health → HTTP 200"
            cat /tmp/health_resp.json 2>/dev/null || true
          elif [ "$STATUS" = "000" ]; then
            echo "❌ G4 FAIL: Backend không phản hồi (timeout/connection refused)"
            echo "BACKEND_URL=$BACKEND_URL — kiểm tra server có đang chạy không"
            # Không exit 1 ngay — tiếp tục collect thêm info
            echo "HEALTH_FAIL=true" >> $GITHUB_ENV
          else
            echo "⚠️  G4 WARN: /v1/health → HTTP $STATUS (expected 200)"
            echo "HEALTH_FAIL=true" >> $GITHUB_ENV
          fi

      - name: "Summarize health result"
        if: always()
        run: |
          if [ "${HEALTH_FAIL:-false}" = "true" ]; then
            echo "## ❌ G4 Health Check FAILED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Backend tại \`$BACKEND_URL\` không phản hồi." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Action cần làm:**" >> $GITHUB_STEP_SUMMARY
            echo "- Kiểm tra server: double-click \`START_HERE.bat\`" >> $GITHUB_STEP_SUMMARY
            echo "- Xem logs: \`docker logs bhl-oms-api\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "## ✅ G4 Health Check PASSED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Backend tại \`$BACKEND_URL\` đang hoạt động bình thường." >> $GITHUB_STEP_SUMMARY
          fi

  # ═══════════════════════════════════════════════════════
  # G4-2: Critical API Smoke (không cần auth — public endpoints)
  # ═══════════════════════════════════════════════════════
  api-smoke:
    name: "G4 ▸ Critical API smoke"
    runs-on: ubuntu-latest
    needs: health-check
    if: success()
    steps:
      - name: "Smoke: GET /v1/test-portal/aqf/status"
        run: |
          STATUS=$(curl -s -o /tmp/aqf_resp.json -w "%{http_code}" \
            --max-time $HEALTH_TIMEOUT \
            "$BACKEND_URL/v1/test-portal/aqf/status" 2>/dev/null || echo "000")
          
          echo "AQF Status endpoint: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ AQF status endpoint fail: $STATUS"
            echo "AQF_FAIL=true" >> $GITHUB_ENV
          else
            echo "✅ AQF status OK"
            # Parse verdict if possible
            VERDICT=$(cat /tmp/aqf_resp.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('verdict', d.get('verdict','unknown')))" 2>/dev/null || echo "unknown")
            echo "AQF Verdict: $VERDICT"
            echo "AQF_VERDICT=$VERDICT" >> $GITHUB_ENV
          fi

      - name: "Smoke: GET /v1/test-portal/risk-monitor"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time $HEALTH_TIMEOUT \
            "$BACKEND_URL/v1/test-portal/risk-monitor" 2>/dev/null || echo "000")
          
          echo "Risk Monitor endpoint: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️  Risk monitor fail: $STATUS (non-blocking)"
          else
            echo "✅ Risk monitor OK"
          fi

      - name: "Smoke: Business health metrics"
        run: |
          STATUS=$(curl -s -o /tmp/biz_health.json -w "%{http_code}" \
            --max-time $HEALTH_TIMEOUT \
            "$BACKEND_URL/v1/test-portal/aqf/health" 2>/dev/null || echo "000")
          
          echo "Business Health endpoint: HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Business health OK"
            cat /tmp/biz_health.json 2>/dev/null | python3 -c "
import sys, json
try:
  d = json.load(sys.stdin)
  health = d.get('data', d)
  print(f\"  Orders today: {health.get('orders_today', 'N/A')}\")
  print(f\"  Trips running: {health.get('trips_running', 'N/A')}\")
  print(f\"  Recon pending: {health.get('recon_pending', 'N/A')}\")
except: pass" 2>/dev/null || true
          fi

      - name: "G4 Summary"
        if: always()
        run: |
          echo "## 📊 G4 Daily Smoke — $(date '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Health endpoint | ✅ OK |" >> $GITHUB_STEP_SUMMARY
          
          if [ "${AQF_FAIL:-false}" = "true" ]; then
            echo "| AQF Status | ❌ FAIL |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| AQF Status (verdict: ${AQF_VERDICT:-?}) | ✅ OK |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** \`$BACKEND_URL\`" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════
  # G4-3: Golden Tests (không cần server — unit tests only)
  # Chạy hàng ngày để detect nếu business rules bị drift
  # ═══════════════════════════════════════════════════════
  golden-drift-check:
    name: "G4 ▸ Golden dataset drift check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bhl-oms
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d65a4827a5f4ad9
        with:
          go-version: "1.23"
          cache: true

      - name: "Run golden tests (no DB needed)"
        run: |
          echo "=== G4: Running golden dataset validation ==="
          go test -v -run "TestGolden|TestCostEngine|TestProperty|TestStateMachine|TestAuthMatrix" \
            ./internal/aqf/... ./internal/tms/... \
            -timeout 60s 2>&1 | tee /tmp/golden_results.txt
          
          PASS_COUNT=$(grep -c "^--- PASS" /tmp/golden_results.txt || echo 0)
          FAIL_COUNT=$(grep -c "^--- FAIL" /tmp/golden_results.txt || echo 0)
          SKIP_COUNT=$(grep -c "^--- SKIP" /tmp/golden_results.txt || echo 0)
          
          echo ""
          echo "=== Golden Results ==="
          echo "PASS: $PASS_COUNT  FAIL: $FAIL_COUNT  SKIP: $SKIP_COUNT"
          
          if [ "$FAIL_COUNT" -gt "0" ]; then
            echo "❌ G4 FAIL: $FAIL_COUNT golden tests failed"
            echo "## ❌ G4 Golden Drift Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**$FAIL_COUNT golden tests failed** — business rules có thể đã thay đổi không có ý thức." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            grep "^--- FAIL\|FAIL\t" /tmp/golden_results.txt | head -20 >> $GITHUB_STEP_SUMMARY || true
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ G4 PASS: $PASS_COUNT golden tests passed ($SKIP_COUNT skipped)"
            echo "## ✅ G4 Golden Tests — No Drift" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "$PASS_COUNT tests passed, $SKIP_COUNT skipped, 0 failures." >> $GITHUB_STEP_SUMMARY
          fi
