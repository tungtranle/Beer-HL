# AQF Weekly — Mutation Score + Eval Harness + KPI
# Chay moi thu 2, 6:00 AM VN (23:00 UTC Chu nhat)

name: "AQF Weekly — Mutation + KPI"

on:
  schedule:
    - cron: "0 23 * * 0"  # Chu nhat 23:00 UTC = Thu 2 06:00 VN
  workflow_dispatch:

env:
  GO_VERSION: "1.23"

jobs:
  # ═══════════════════════════════════════════════════════
  # Weekly: Go test với full coverage (không -short)
  # ═══════════════════════════════════════════════════════
  weekly-full-test:
    name: "Weekly ▸ Full test suite"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bhl-oms
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: bhl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d65a4827a5f4ad9
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run migrations
        run: |
          for f in migrations/*.up.sql; do
            PGPASSWORD=test psql -h localhost -U test -d bhl_test -f "$f" 2>/dev/null || true
          done

      - name: Full test suite with coverage
        run: go test -race -coverprofile=coverage.out -coverpkg=./... -timeout 300s ./...
        env:
          DB_URL: postgres://test:test@localhost:5432/bhl_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          JWT_PRIVATE_KEY_PATH: keys/private.pem
          JWT_PUBLIC_KEY_PATH: keys/public.pem

      - name: Coverage report
        run: |
          echo "=== Coverage by Package ==="
          go tool cover -func=coverage.out
          
          # Check total coverage
          TOTAL=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo ""
          echo "Total Coverage: ${TOTAL}%"
          
          # AQF target: > 60% (Level 1), > 70% (Level 2+)
          if awk "BEGIN{exit !($TOTAL < 60)}"; then
            echo "⚠️  WARN: Coverage ${TOTAL}% < 60% AQF target"
          else
            echo "✅ Coverage ${TOTAL}% meets AQF target"
          fi

      - name: Upload coverage HTML
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: weekly-coverage-report
          path: bhl-oms/coverage.out
          retention-days: 30

  # ═══════════════════════════════════════════════════════
  # Weekly: Dependency vuln scan (đầy đủ, không chỉ diff)
  # ═══════════════════════════════════════════════════════
  weekly-security-full:
    name: "Weekly ▸ Full security scan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bhl-oms
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d65a4827a5f4ad9
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: govulncheck (Go full scan)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Trivy (filesystem scan)
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8  # latest pinned
        with:
          scan-type: fs
          scan-ref: bhl-oms
          severity: CRITICAL,HIGH
          exit-code: 0  # warn, không block weekly

      - name: Gitleaks full history scan
        run: |
          if command -v gitleaks >/dev/null 2>&1; then
            gitleaks detect --no-banner --report-format json --report-path gitleaks-report.json || true
            if [ -f gitleaks-report.json ] && [ -s gitleaks-report.json ]; then
              echo "⚠️  Gitleaks findings:"
              cat gitleaks-report.json
            else
              echo "✅ Gitleaks: no secrets found"
            fi
          fi

  # ═══════════════════════════════════════════════════════
  # Weekly: KPI Report
  # ═══════════════════════════════════════════════════════
  weekly-kpi-report:
    name: "Weekly ▸ AQF KPI Report"
    needs: [weekly-full-test, weekly-security-full]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Generate AQF KPI Summary
        run: |
          echo "══════════════════════════════════════════════"
          echo "AQF WEEKLY KPI REPORT — $(date +'%Y-%m-%d')"
          echo "══════════════════════════════════════════════"
          echo ""
          echo "Full Test:     ${{ needs.weekly-full-test.result }}"
          echo "Security Scan: ${{ needs.weekly-security-full.result }}"
          echo ""
          echo "📋 Action Items theo AQF Operating Cadence:"
          echo "  □ Review flaky test list"
          echo "  □ Review quarantine list"
          echo "  □ Check feature flag ages (> 60 ngày?)"
          echo "  □ Review mutation score trend"
          echo "  □ Check MTTD và Defect Escape Rate tuần này"
          echo ""
          echo "Artifacts: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "══════════════════════════════════════════════"
