requirements:

  # ─── OMS Business Rules ────────────────────────────────

  - id: BR-CRD-01
    description: "order.total > customer.available_credit_limit → status=pending_approval"
    module: "oms"
    tests:
      unit:
        - "internal/aqf/golden_test.go#TestGolden_CreditCases"
        - "internal/aqf/property_test.go#TestProperty_Invariant_CreditCheck_Deterministic"
      golden: "aqf/golden/credit.cases.json"
    status: "covered"
    lastVerified: "2026-04-26"

  - id: BR-CRD-02
    description: "credit_limit=0 → unlimited (luôn confirmed)"
    module: "oms"
    tests:
      unit:
        - "internal/aqf/golden_test.go#TestGolden_CreditCases"
        - "internal/aqf/property_test.go#TestProperty_Invariant_UnlimitedCredit"
    status: "covered"
    lastVerified: "2026-04-26"

  - id: BR-OMS-03
    description: "Order number = SO-{YYYYMMDD}-{NNNN}"
    module: "oms"
    tests:
      unit:
        - "internal/oms/service_test.go#TestGenerateOrderNumber_Format"
        - "internal/oms/service_test.go#TestGenerateOrderNumber_Uniqueness"
        - "internal/aqf/property_test.go#TestProperty_Invariant_OrderNumberFormat"
    status: "covered"
    lastVerified: "2026-04-26"

  - id: BR-OMS-04
    description: "Trước 16h = before_16h (giao hôm nay), Sau 16h = after_16h (giao T+1)"
    module: "oms"
    tests:
      unit:
        - "internal/oms/service_test.go#TestCutoffGroupLogic_Before16h"
        - "internal/oms/service_test.go#TestCutoffGroupLogic_After16h"
    status: "covered"
    lastVerified: "2026-04-26"

  # ─── WMS Business Rules ────────────────────────────────

  - id: INV-FEFO-01
    description: "WMS luôn cấp phát lô có expiry_date sớm nhất trước (FEFO)"
    module: "wms"
    tests:
      unit:
        - "internal/aqf/golden_test.go#TestGolden_InventoryFEFO"
        - "internal/aqf/property_test.go#TestProperty_Invariant_FEFO_OldestFirst"
        - "internal/aqf/property_test.go#TestProperty_Invariant_FEFO_TotalQty"
      golden: "aqf/golden/inventory-fefo.cases.json"
    status: "covered"
    lastVerified: "2026-04-26"

  # ─── State Machine Rules ───────────────────────────────

  - id: INV-STATE-01
    description: "Order state machine: chỉ valid transitions được phép"
    module: "oms"
    tests:
      unit:
        - "internal/aqf/golden_test.go#TestGolden_OrderStateMachine"
        - "internal/aqf/property_test.go#TestProperty_Invariant_StateMachine_TerminalStates"
        - "internal/aqf/property_test.go#TestProperty_Invariant_StateMachine_NoSelfLoop"
      golden: "aqf/golden/order-state-machine.cases.json"
    status: "covered"
    lastVerified: "2026-04-26"

  - id: INV-STATE-02
    description: "Trip state machine: driver không start khi chưa approved"
    module: "tms"
    tests:
      unit: []  # cần viết khi tms/service.go state machine được extract
      golden: "aqf/golden/trip-state-machine.cases.json"
