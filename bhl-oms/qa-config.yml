# BHL OMS-TMS-WMS — QA Reference Config
# Mục đích: Single source of truth cho AI đọc khi thực hiện QA tasks
# Cập nhật: 24/04/2026
# KHÔNG phải executable — đây là reference document

project:
  name: "BHL OMS-TMS-WMS"
  description: "Phân phối bia Hà Nội — 80 users nội bộ, ~1.700 tỷ/năm"
  go_live: "15/05/2026"
  stack:
    backend: "go + gin"
    frontend: "nextjs 14"
    db: "postgres:5434"
    cache: "redis:6379"
    vrp: "python or-tools:8090"
    mobile: "pwa (driver app)"
  code_paths:
    backend_handlers: "internal/*/handler.go"
    frontend_pages: "web/src/app/**/page.tsx"
    tests: "tests/"
    lib_fe: "web/src/lib/"

# ─────────────────────────────────────────────
# UTILITIES — phải tồn tại trước khi test
# ─────────────────────────────────────────────
utils:
  money_parse:
    name: "safeParseVND"
    path: "web/src/lib/safeParseVND.ts"
    status: "MISSING — cần tạo (LH-02)"
    test_cases:
      - { input: "12,500",     expected: 12500 }
      - { input: "1.200.000",  expected: 1200000 }
      - { input: "abc",        expected: 0 }
      - { input: "",           expected: 0 }
      - { input: "-100",       expected: error }  # tiền không âm trong nghiệp vụ BHL
  money_format:
    name: "formatVND"
    path: "web/src/lib/status-config.ts"
    status: "EXISTS — dùng ngay"
  error_handler:
    name: "handleError"
    path: "web/src/lib/handleError.ts"
    status: "EXISTS — chưa dùng ở ATP/credit (LH-03)"
  offline_queue:
    name: "queueOfflineRequest"
    path: "web/src/lib/useOfflineSync.ts:83"
    status: "EXISTS — 0 nơi gọi (LH-04)"

# ─────────────────────────────────────────────
# LỖ HỔNG — fix theo thứ tự severity
# ─────────────────────────────────────────────
known_gaps:
  - id: "LH-03"
    severity: "CRITICAL"
    fix_deadline: "hôm nay"
    description: ".catch(console.error) ở ATP + credit → silent fail"
    files:
      - "web/src/app/dashboard/orders/new/page.tsx:~144"
      - "web/src/app/dashboard/orders/new/page.tsx:~95"
    verify: "Tắt backend → form tạo đơn show warning + disable Submit"

  - id: "LH-04"
    severity: "CRITICAL"
    fix_deadline: "hôm nay"
    description: "queueOfflineRequest chưa wire vào driver actions"
    files:
      - "web/src/app/dashboard/driver/[id]/page.tsx → handleUpdateStop"
      - "web/src/app/dashboard/driver/[id]/page.tsx → handleSubmitEPOD"
      - "web/src/app/dashboard/driver/[id]/page.tsx → handlePayment"
    verify: "Tắt 4G → bấm arrived → bật 4G → DB: stop.status = arrived"

  - id: "LH-02"
    severity: "HIGH"
    fix_deadline: "tuần này"
    description: "parseFloat cho tiền ở 3 file"
    files:
      - "web/src/app/dashboard/orders/new/page.tsx:185-194"
      - "web/src/app/dashboard/products/page.tsx:213-217"
      - "web/src/app/dashboard/driver/[id]/page.tsx:1181"
    verify: "Nhập '12,500' → hiển thị 12.500đ, không phải 12đ"

  - id: "LH-01"
    severity: "MEDIUM"
    fix_deadline: "trước go-live"
    description: "Form validation chỉ dùng disabled button — không có Zod"

# ─────────────────────────────────────────────
# BUSINESS RULES — test bắt buộc
# ─────────────────────────────────────────────
business_rules:
  - id: "R01"
    name: "Gate check zero tolerance"
    test_file: "tests/api/business-rules/R01-gate-check-zero-tolerance.bru"
    scenario: "Submit bàn giao với số thực ≠ số lệnh xuất"
    assertion: "status_code = 400 + body chứa error mismatch"
    status: "MISSING"

  - id: "R08"
    name: "Cutoff 16h"
    test_file: "tests/api/business-rules/R08-cutoff-16h.bru"
    scenario: "POST /orders với delivery_date = hôm nay lúc 16:01"
    assertion: "status_code = 400, body.error = 'cutoff_exceeded'"
    note: "Timezone: Asia/Ho_Chi_Minh (confirmed từ code oms/service.go)"
    status: "MISSING"

  - id: "R15"
    name: "Credit limit block"
    test_file: "tests/api/business-rules/R15-credit-limit-block.bru"
    scenario: "NPP outstanding=490M, limit=500M, đặt đơn 15M"
    assertion: "body.data.status === 'pending_approval' — KHÔNG chỉ check status_code"
    status: "MISSING"

  - id: "R18"
    name: "Bàn giao C immutable"
    test_file: "tests/api/business-rules/R18-handover-c-immutable.bru"
    scenario: "Biên bản C đã ký → thử PATCH/PUT"
    assertion: "status_code in [403, 405]"
    status: "MISSING"

  - id: "C-08"
    name: "Duplicate submit prevention"
    test_file: "tests/api/business-rules/C08-duplicate-submit.bru"
    scenario: "Submit cùng order 2 lần cùng lúc"
    assertion: "DB: COUNT(orders) = 1, request 2 nhận 409"
    status: "MISSING"

