    done_when: ["30 bru tests có body assertion", "RBAC matrix người có thể giải thích"]
    hours_estimate: "12-17h"

  week_3:  # 08/05–14/05 — "E2E + Smoke Test Portal"
    tasks: ["/qa-gen e2e-journeys (3 luồng)", "Test Portal assertion layer", "Clarity gắn"]
    done_when: ["3 E2E pass headless", "Smoke button 17/17 pass"]
    hours_estimate: "15-20h"

  week_4:  # 15/05–21/05 — "Chaos + Synthetic + Go-live"
