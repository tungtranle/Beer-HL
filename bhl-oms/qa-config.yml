# ─────────────────────────────────────────────
# CRITICAL ENDPOINTS
# ─────────────────────────────────────────────
critical_endpoints:
  - { method: "POST", path: "/v1/orders",
      roles: ["dispatcher","admin","dvkh"], financial_impact: true }

  - { method: "POST", path: "/v1/atp/batch",
      roles: ["dispatcher","admin"], financial_impact: true,
      note: "Fail mà FE không handle → LH-03" }

  - { method: "POST", path: "/v1/trips/:id/stops/:stopId/update-status",
      roles: ["driver"], offline_critical: true }

  - { method: "POST", path: "/v1/gate-check",
      roles: ["warehouse","security","admin"], business_rule: "R01" }

  - { method: "POST", path: "/v1/handover/c/sign",
      roles: ["warehouse","admin"], business_rule: "R18",
      note: "Sau khi sign → immutable" }

# ─────────────────────────────────────────────
# 3 GATES TRƯỚC GO-LIVE
# ─────────────────────────────────────────────
gates:
  A_critical_fixes:
    description: "Không có lỗ hổng chết người"
    checks:
      - "LH-03 fix: tắt BE → form warning + Submit disabled"
      - "LH-04 fix: offline sync → DB đúng (test thật)"
      - "LH-02 fix: safeParseVND tồn tại + được import"
      - "5 business rule tests: 5/5 pass"
      - "IDOR: driver A không xem được trip driver B"

  B_e2e_journeys:
    description: "Luồng sinh tiền/hàng chạy được"
    auto_checks:
      - "E2E-1: Dispatcher tạo đơn → order trong DB"
      - "E2E-2: Gate check → handover status đúng"
      - "E2E-3: Driver giao hàng → stop + trip status đúng"
    manual_checks:
      - "👤 Offline test: stop.status = arrived sau sync (người làm)"
      - "👤 ePOD photo upload trên Android thật (người làm)"

  C_production_ready:
    description: "Sẵn sàng sau go-live"
    checks:
      - "Microsoft Clarity gắn vào web/src/app/layout.tsx"
      - "Telegram bot alert: fail 2 lần → nhận tin nhắn"
      - "ENABLE_TEST_PORTAL=false trong .env.production"
      - "gosec ./... 0 high/critical"
      - "npm audit --audit-level=high 0 vuln"

# ─────────────────────────────────────────────
# SYNTHETIC MONITORING (sau go-live)
# ─────────────────────────────────────────────
synthetic:
  frequency: "mỗi 15 phút"
  tool: "Playwright headless + Windows Task Scheduler"
  flows:
    - "API health: Bruno smoke 30 critical endpoints"
    - "Dispatcher: login → tạo đơn → verify order created"
    - "Driver: login → update stop → verify DB"
    - "Warehouse: login → gate check → verify pass"
  alert:
    fail_threshold: 2  # lần liên tiếp
    channel: "Telegram"
    bot_token: "SET ENV: TELEGRAM_BOT_TOKEN"
    chat_id: "SET ENV: TELEGRAM_CHAT_ID"

# ─────────────────────────────────────────────
# LỊCH 4 TUẦN
# ─────────────────────────────────────────────
timeline:
  week_1:  # 24/04–01/05 — "Vá lỗ hổng trước, không làm gì khác"
    tasks: ["Fix LH-03", "Fix LH-04", "Fix LH-02 (safeParseVND)", "/qa-gen business-rules"]
