worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Performance ──────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    server_tokens      off;

    # ── Compression ──────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/xml+rss application/wasm image/svg+xml
        font/woff2 application/font-woff2;

    # ── Proxy shared settings ────────────────────────────
    proxy_http_version  1.1;
    proxy_buffering     on;
    proxy_buffer_size   16k;
    proxy_buffers       8 16k;
    proxy_busy_buffers_size 32k;
    proxy_connect_timeout   10s;
    proxy_send_timeout      30s;
    proxy_read_timeout      60s;
    # Strip Connection header so upstream keep-alive works
    proxy_set_header Connection "";

    # ── Proxy cache — for /_next/static (immutable JS/CSS) ─
    proxy_cache_path /var/cache/nginx/static
        levels=1:2 keys_zone=static_cache:20m max_size=1g
        inactive=365d use_temp_path=off;

    # ── Upstreams (keep-alive to containers) ─────────────
    upstream api {
        server api:8080;
        keepalive 32;
    }

    upstream web {
        server web:3000;
        keepalive 16;
    }

    upstream grafana {
        server grafana:3000;
        keepalive 8;
    }

    # ── Rate limiting ─────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # ── HTTP → HTTPS redirect ─────────────────────────────
    server {
        listen 80;
        server_name oms.bhl.vn bhl.symper.us;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ─────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name oms.bhl.vn bhl.symper.us;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:20m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # HSTS — 6 months
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

        client_max_body_size 10M;

        # ── Static JS/CSS chunks — content-hashed, cache 1 year ──
        location /_next/static/ {
            proxy_pass         http://web;
            proxy_cache        static_cache;
            proxy_cache_valid  200 365d;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Cache-Status $upstream_cache_status always;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── API routes ────────────────────────────────────
        location /v1/auth/login {
            limit_req zone=login_limit burst=3 nodelay;
            proxy_pass         http://api;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /v1/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass         http://api;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Health + Metrics ──────────────────────────────
        location /health {
            proxy_pass http://api;
        }

        location /metrics {
            allow  10.0.0.0/8;
            allow  172.16.0.0/12;
            allow  192.168.0.0/16;
            deny   all;
            proxy_pass http://api;
        }

        # ── WebSocket — GPS + Notifications realtime ─────
        # /v1/ws/* routes (current — after v1.6.4 route migration)
        location /v1/ws/ {
            proxy_pass             http://api;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host $host;
            proxy_set_header       X-Real-IP $remote_addr;
            proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_read_timeout     86400;
        }

        # /ws/* legacy path (kept for backward compat)
        location /ws/ {
            proxy_pass             http://api;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host $host;
            proxy_read_timeout     86400;
        }

        # ── Frontend (HTML pages) ─────────────────────────
        location / {
            proxy_pass       http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── Monitoring — monitor.bhl.vn ───────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name monitor.bhl.vn;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass       http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
